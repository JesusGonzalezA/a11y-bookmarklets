name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bookmarklets
        run: npm run build:bookmarklets

      - name: Build website
        run: npm run build -w packages/website
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Copy bookmarklet scripts to website dist
        run: cp -r dist/bookmarklets packages/website/dist/bookmarklets

      - name: Add SPA fallback (404.html)
        run: cp packages/website/dist/index.html packages/website/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
